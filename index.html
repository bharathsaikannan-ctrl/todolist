<!DOCTYPE html><html><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Attractive To-Do</title><style>*{box-sizing:border-box;font-family:Segoe UI,sans-serif}body{margin:0;min-height:100vh;display:flex;justify-content:center;align-items:center;background:linear-gradient(135deg,#141e30,#243b55)}.box{width:min(92%,500px);background:#ffffff12;backdrop-filter:blur(16px);padding:24px;border-radius:20px;color:#fff}h1{text-align:center;color:#6ef3ff}.row{display:flex;gap:10px}input{flex:1;padding:12px;border:none;border-radius:10px}button{padding:12px 16px;border:none;border-radius:10px;background:#00e5ff;font-weight:bold;cursor:pointer}ul{list-style:none;padding:0}li{display:flex;justify-content:space-between;align-items:center;background:#fff1;padding:10px;margin:10px 0;border-radius:10px}.done{text-decoration:line-through;color:#8f8}.del{background:#f55}.prog{height:10px;background:#333;border-radius:8px}.fill{height:100%;background:#00e5ff;width:0}</style></head><body><div class=box><h1>✨ To-Do List</h1><div class=row><input id=t placeholder='Enter task'><button onclick='add()'>Add</button></div><p id=s></p><div class=prog><div id=f class=fill></div></div><ul id=l></ul></div><script>let a=JSON.parse(localStorage.todo||'[]');function save(){localStorage.todo=JSON.stringify(a)}function draw(){l.innerHTML='';let c=0;a.forEach((x,i)=>{if(x.d)c++;let li=document.createElement('li');let sp=document.createElement('span');sp.textContent=x.t;sp.className=x.d?'done':'';sp.onclick=()=>{x.d=!x.d;save();draw()};let d=document.createElement('div');d.innerHTML='<button onclick="">'+(x.d?'Undo':'Done')+'</button><button class=del>Delete</button>';d.children[0].onclick=()=>{x.d=!x.d;save();draw()};d.children[1].onclick=()=>{a.splice(i,1);save();draw()};li.append(sp,d);l.append(li)});s.textContent='Completed '+c+' of '+a.length;f.style.width=(a.length?c/a.length*100:0)+'%'};function add(){if(!t.value.trim())return;a.unshift({t:t.value,d:false});t.value='';save();draw()}draw();</script></body></html>
